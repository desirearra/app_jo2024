# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: fr
early_access: false
reviews:
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    ignore_title_patterns:
      - "^wip.*"
      - "^draft.*"
    draft: false
    labels: ["needs-review", "ready-for-review"]
    base_branches:
      - "main"
      - "develop"
      - "feature/*"
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/coverage/**"
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        Ce projet utilise TypeScript avec React.
        Vérifiez :
        - Le typage strict
        - Les bonnes pratiques React (hooks, composants fonctionnels)
        - La gestion d'état
        - Les tests avec Jest et React Testing Library
        - L'accessibilité (a11y)
        - La documentation des composants
        - La gestion des erreurs
        - Les performances
    - path: "**/*.test.{ts,tsx}"
      instructions: |
        Tests avec Jest et React Testing Library.
        Vérifiez :
        - La couverture des cas d'utilisation
        - L'utilisation des bonnes pratiques de test
        - Les assertions pertinentes
        - Les mocks appropriés
        - La clarté des descriptions de test
    - path: "**/*.css"
      instructions: |
        Utilisation de Tailwind CSS.
        Vérifiez :
        - La cohérence avec le design system
        - L'approche mobile-first
        - L'optimisation des classes
        - La réutilisabilité
        - L'accessibilité des styles

chat:
  auto_reply: true
  language: fr
  review_comment_template: |
    Merci pour ces changements ! Voici mon analyse :

    ## Points positifs ✨
    {{positives}}

    ## Suggestions d'amélioration 🔧
    {{suggestions}}

    ## Questions 🤔
    {{questions}}

style:
  typescript:
    eslint:
      enabled: true
      config_file: .eslintrc.js
    prettier:
      enabled: true
      config_file: .prettierrc

suggestions:
  auto_apply: false
  safe_changes: true

ignore:
  - "**/*.md"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/coverage/**"
  - "**/.next/**"

metrics:
  enabled: true
  tracker: github_issues
  labels: ["metrics", "coderabbit"]
