name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    name: 🧪 Tests et Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MASTER_KEY: ${{ secrets.MASTER_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jo2024
          POSTGRES_PASSWORD: jo2024
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🎯 Lint
        run: |
          npm run lint --workspaces
          npm run format:check --workspaces

      - name: 🗃️ Appliquer les migrations Prisma
        run: cd packages/backend && npx prisma migrate deploy && cd ../..

      - name: 🗃️ Enregistrer les fixtures
        run: cd packages/backend && npm run seed --if-present

      - name: 🧪 Tests
        run: npm test --workspaces

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build Frontend
        run: npm run build --workspace=packages/frontend

      - name: 🏗️ Build Backend
        run: npm run build --workspace=packages/backend
