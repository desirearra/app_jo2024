name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    name: 🧪 Tests et Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🎯 Lint
        run: |
          npm run lint --workspaces
          npm run format:check --workspaces

      - name: 🗃️ Appliquer les migrations Prisma
        run: cd packages/backend && npx prisma migrate deploy && cd ../..
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          SHADOW_DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db_shadow

      - name: 🧪 Tests
        run: npm test --workspaces
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          SHADOW_DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db_shadow

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build Frontend
        run: npm run build --workspace=packages/frontend

      - name: 📦 Sauvegarder les artefacts de build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: packages/frontend/dist
          retention-days: 7

      - name: 🏗️ Build Backend
        run: npm run build --workspace=packages/backend
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
