version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jo2024_db
    environment:
      POSTGRES_USER: jo2024
      POSTGRES_PASSWORD: jo2024
      POSTGRES_DB: jo2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jo2024"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
